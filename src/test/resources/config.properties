# ═══════════════════════════════════════════════════════════════════════════════
# FUNNEL1PG TEST CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# APPLICATION URL
# Override: -Dbase.url=https://your-url.com/
# ───────────────────────────────────────────────────────────────────────────────
base.url=https://stagingabhishek.gupigayen.com/1pgCC25Feb/

# ───────────────────────────────────────────────────────────────────────────────
# BROWSER
# ───────────────────────────────────────────────────────────────────────────────
browser=chromium
headless=false
slow.mo=0

# ───────────────────────────────────────────────────────────────────────────────
# TIMEOUTS
# ───────────────────────────────────────────────────────────────────────────────
timeout=15000

# ───────────────────────────────────────────────────────────────────────────────
# REPORTING & SCREENSHOTS
# ───────────────────────────────────────────────────────────────────────────────
screenshot.on.failure=true
reports.dir=reports

# ───────────────────────────────────────────────────────────────────────────────
# TEST DATA
# ───────────────────────────────────────────────────────────────────────────────
randomize.data=false

# ───────────────────────────────────────────────────────────────────────────────
# PAYMENT METHOD
# Determines which payment method is used on checkout.
# Values: creditcard | cod (Cash on Delivery)
# Override via command line: -Dpayment.method=cod
# Default is creditcard; use cod to test Cash on Delivery flow.
# ───────────────────────────────────────────────────────────────────────────────
payment.method=creditcard

# ═══════════════════════════════════════════════════════════════════════════════
# USAGE EXAMPLES
# ═══════════════════════════════════════════════════════════════════════════════
# Run with credit card (default):
#   mvn test -Dcucumber.filter.tags="@happy-path"
#
# Run with Cash on Delivery:
#   mvn test -Dcucumber.filter.tags="@happy-path" -Dpayment.method=cod
#
# Run against different URL:
#   mvn test -Dbase.url=https://stagingabhishek.gupigayen.com/1pgCC24Feb/
#
# Run headless (CI/CD):
#   mvn test -Dheadless=true
# ═══════════════════════════════════════════════════════════════════════════════
